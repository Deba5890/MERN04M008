<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">

  <!-- HEADER -->
  <div class="bg-white p-4 shadow flex justify-between">
    <h1 class="font-bold text-lg">🛒 Your Cart</h1>
    <button onclick="goBack()" class="text-blue-600">← Back</button>
  </div>

 

  <!-- CART ITEMS -->
  <div id="cartItems" class="p-4 space-y-3"></div>
<div class="p-4 bg-white shadow mt-4">
  <h2 class="text-lg font-bold">
    Total: ₹<span id="totalPrice">0</span>
  </h2>
</div>
  
  <div class="fixed bottom-0 left-0 w-full bg-white p-4 shadow-lg">
    <button onclick="buyNow()" 
      class="w-full bg-red-600 text-white py-3 rounded-xl font-bold text-lg">
      Buy Now
    </button>
  </div>

  <script src="cart.js"></script>
</body>
</html>
