<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<!-- LOGIN CARD -->
<div class="bg-white w-[350px] p-6 rounded-xl shadow">

  <!-- Title -->
  <h2 class="text-2xl font-bold text-center mb-5">Login</h2>

  <!-- FORM -->
  <form onsubmit="loginUser(event)" class="space-y-4">

    <!-- Email -->
    <div>
      <label class="text-sm text-gray-600">Email</label>
      <input id="email" type="email" placeholder="Enter your email"
        class="w-full border p-2 rounded mt-1 focus:outline-blue-500">
    </div>

    <!-- Password -->
    <div>
      <label class="text-sm text-gray-600">Password</label>
      <input id="password" type="password" placeholder="Enter your password"
        class="w-full border p-2 rounded mt-1 focus:outline-blue-500">
    </div>

    <!-- Login Button -->
    <button class="w-full bg-red-500 text-white py-2 rounded font-semibold">
      Login
    </button>

  </form>

  <!-- Extra Options -->
  <div class="flex justify-between mt-3 text-sm">
    <a href="#" class="text-blue-600">Forgot Password?</a>
    <a href="register.html" class="text-blue-600">Create Account</a>
  </div>

  <!-- Skip -->
  <p onclick="skipLogin()" 
     class="text-center text-gray-500 text-sm mt-4 cursor-pointer hover:underline">
    Skip for now
  </p>

</div>

<script src="loginscript.js"></script>
</body>
</html>
