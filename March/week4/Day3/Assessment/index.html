<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <!-- Card Container -->
    <div class="bg-white p-8 rounded-2xl shadow-lg w-80">

        <!-- Title -->
        <h2 class="text-2xl font-bold text-center mb-6">Login</h2>

        <!-- Email Input -->
        <input type="email"
            placeholder="Enter Email"
            class="w-full p-2 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

        <!-- Password Input -->
        <input type="password"
            placeholder="Enter Password"
            class="w-full p-2 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

        <!-- Login Button -->
        <button
            class="w-full bg-blue-500 text-white p-2 rounded-lg hover:bg-blue-600 transition">
            Login
        </button>

        <!-- Register Link -->
        <p class="text-center text-sm mt-4">
            Don't have an account?
            <a href="#" class="text-blue-500 hover:underline">Register</a>
        </p>

    </div>

</body>
</html>
